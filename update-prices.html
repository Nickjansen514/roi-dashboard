<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Prijzen Updater</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 20px; background: #f5f4f0; }
  h1 { font-size: 22px; margin-bottom: 6px; }
  p { color: #666; margin-bottom: 24px; }
  .btn { background: #2d5fa8; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  .log { margin-top: 24px; background: white; border-radius: 8px; padding: 16px; font-size: 13px; font-family: monospace; height: 300px; overflow-y: auto; border: 1px solid #ddd; }
  .stat { display: flex; gap: 16px; margin-top: 16px; }
  .stat-box { background: white; border-radius: 8px; padding: 14px 20px; flex: 1; text-align: center; border: 1px solid #ddd; }
  .stat-box .num { font-size: 28px; font-weight: 600; color: #2d5fa8; }
  .stat-box .lbl { font-size: 12px; color: #666; margin-top: 4px; }
  .done { color: #2a8a5e; font-weight: 600; font-size: 16px; margin-top: 16px; }
</style>
</head>
<body>
<h1>Prijzen Updater — Yamira London</h1>
<p>Klikt één keer op de knop en hij update automatisch alle prijzen van .95 naar .99</p>

<button class="btn" id="btn" onclick="start()">🚀 Start prijzen updaten</button>

<div class="stat">
  <div class="stat-box"><div class="num" id="cnt-updated">0</div><div class="lbl">Updated</div></div>
  <div class="stat-box"><div class="num" id="cnt-skipped">0</div><div class="lbl">Al correct</div></div>
  <div class="stat-box"><div class="num" id="cnt-errors">0</div><div class="lbl">Errors</div></div>
  <div class="stat-box"><div class="num" id="cnt-pages">0</div><div class="lbl">Batches</div></div>
</div>

<div class="log" id="log"></div>
<div id="done-msg"></div>

<script>
  var totalUpdated = 0;
  var totalSkipped = 0;
  var totalErrors = 0;
  var totalPages = 0;
  var running = false;

  function log(msg) {
    var el = document.getElementById('log');
    el.innerHTML += msg + '<br>';
    el.scrollTop = el.scrollHeight;
  }

  function updateStats() {
    document.getElementById('cnt-updated').textContent = totalUpdated;
    document.getElementById('cnt-skipped').textContent = totalSkipped;
    document.getElementById('cnt-errors').textContent = totalErrors;
    document.getElementById('cnt-pages').textContent = totalPages;
  }

  async function start() {
    if (running) return;
    running = true;
    document.getElementById('btn').disabled = true;
    document.getElementById('log').innerHTML = '';
    document.getElementById('done-msg').innerHTML = '';
    totalUpdated = 0; totalSkipped = 0; totalErrors = 0; totalPages = 0;

    var sinceId = '0';

    while (true) {
      try {
        log('⏳ Batch ' + (totalPages + 1) + ' ophalen (since_id: ' + sinceId + ')...');
        var r = await fetch('/api/update-prices?since_id=' + sinceId);
        var data = await r.json();

        if (!data.success) {
          log('❌ Fout: ' + (data.error || 'onbekend'));
          break;
        }

        totalPages++;
        totalUpdated += data.summary.variants_updated;
        totalSkipped += data.summary.variants_skipped;
        totalErrors += data.summary.errors;
        updateStats();

        if (data.summary.variants_updated > 0) {
          log('✅ Batch ' + totalPages + ': ' + data.summary.variants_updated + ' updated, ' + data.summary.variants_skipped + ' al correct');
        } else {
          log('✓ Batch ' + totalPages + ': ' + data.summary.variants_skipped + ' al correct');
        }

        if (!data.has_more) {
          log('🎉 Klaar! Alle producten verwerkt.');
          document.getElementById('done-msg').innerHTML = '<p class="done">✅ Alle prijzen zijn bijgewerkt van .95 naar .99!</p>';
          break;
        }

        // Haal since_id uit next_url
        var match = data.next_url && data.next_url.match(/since_id=(\d+)/);
        if (!match) {
          log('✅ Geen volgende pagina meer — klaar!');
          break;
        }
        sinceId = match[1];

        // Wacht 500ms tussen batches
        await new Promise(function(r) { setTimeout(r, 500); });

      } catch(e) {
        log('❌ Fout: ' + e.message);
        break;
      }
    }

    running = false;
    document.getElementById('btn').disabled = false;
  }
</script>
</body>
</html>
